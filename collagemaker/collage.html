<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Square Collage Creator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #eceff1; padding: 20px; color: #333; }
        .controls { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .grid-container { display: grid; gap: 12px; background: #cfd8dc; padding: 12px; border-radius: 8px; }
        
        .slot { 
            width: 200px; height: 200px; background: #fff; border: 2px dashed #90a4ae; 
            display: flex; align-items: center; justify-content: center; overflow: hidden; 
            position: relative; transition: border 0.2s; user-select: none; touch-action: none;
        }
        .slot.selected { border-color: #2196f3; border-style: solid; box-shadow: 0 0 8px rgba(33, 150, 243, 0.5); background: #f0f7ff; }
        
        .img-wrapper { width: 100%; height: 100%; cursor: move; display: none; position: relative; }
        .img-wrapper img { pointer-events: none; position: absolute; top: 50%; left: 50%; transform-origin: center center; }
        
        /* HIDDEN BY DEFAULT: Only shows when slot is .has-image AND .selected */
        .slot-ui { 
            position: absolute; bottom: 5px; left: 5%; width: 90%; 
            display: none; flex-direction: column; background: rgba(255,255,255,0.9); 
            padding: 4px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; 
        }
        .slot.has-image.selected .slot-ui { display: flex; }
        
        .slot.has-image .img-wrapper { display: block; }
        .slot.has-image .placeholder-text { display: none; }

        button { padding: 10px 20px; cursor: pointer; background: #2196f3; color: white; border: none; border-radius: 6px; font-weight: 600; }
        .btn-copy { background: #4caf50; }
        .btn-copy.copied { background: #a5d6a7; }
        canvas { display: none; }
        .hint { margin-bottom: 15px; color: #666; font-size: 0.9em; }
    </style>
</head>
<body>

    <h2>Collage Creator</h2>
    <div class="hint">Focus Square to Zoom • Double-click to Upload • Drag to Position</div>

    <div class="controls">
        <label>Grid: <input type="number" id="gridInput" value="2" min="1" max="5"></label>
        <label>Res (px): <input type="number" id="resInput" value="1080"></label>
        <button onclick="updateGrid()" style="background: #607d8b;">Apply Settings</button>
    </div>

    <div id="collageGrid" class="grid-container"></div>

    <div style="margin-top: 25px; display: flex; gap: 15px;">
        <button onclick="exportCollage('download')">Download PNG</button>
        <button id="copyBtn" class="btn-copy" onclick="exportCollage('clipboard')">Copy to Clipboard</button>
    </div>

    <canvas id="exportCanvas"></canvas>
    <input type="file" id="fileInput" hidden accept="image/*">

    <script>
        const gridContainer = document.getElementById('collageGrid');
        const fileInput = document.getElementById('fileInput');
        let selectedIndex = 0; 
        const state = {}; 

        function updateGrid() {
            const size = document.getElementById('gridInput').value;
            gridContainer.innerHTML = '';
            gridContainer.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            for (let i = 0; i < size * size; i++) { createSlot(i); }
        }

        function createSlot(i) {
            const slot = document.createElement('div');
            slot.className = 'slot' + (i === 0 ? ' selected' : '');
            slot.dataset.index = i;
            slot.innerHTML = `<div class="placeholder-text" style="font-size:11px; color:#999; text-align:center">Click: Focus<br>DBL Click: Upload</div>
                              <div class="img-wrapper"><img id="img-${i}"></div>
                              <div class="slot-ui"><input type="range" min="1" max="4" step="0.01" value="1" id="zoom-${i}"></div>`;
            
            state[i] = { img: null, x: 0, y: 0, zoom: 1, baseScale: 1, isDragging: false, startX: 0, startY: 0 };

            slot.onclick = () => selectSlot(i);
            slot.ondblclick = () => { selectSlot(i); fileInput.click(); };
            
            const zoomInput = slot.querySelector('input');
            zoomInput.onclick = (e) => e.stopPropagation();
            zoomInput.oninput = (e) => {
                state[i].zoom = parseFloat(e.target.value);
                constrainAndApply(i);
            };

            slot.onmousedown = (e) => {
                if (!state[i].img) return;
                state[i].isDragging = true;
                state[i].startX = e.clientX - state[i].x;
                state[i].startY = e.clientY - state[i].y;
            };

            window.addEventListener('mousemove', (e) => {
                if (!state[i].isDragging) return;
                state[i].x = e.clientX - state[i].startX;
                state[i].y = e.clientY - state[i].startY;
                constrainAndApply(i);
            });

            window.addEventListener('mouseup', () => state[i].isDragging = false);
            gridContainer.appendChild(slot);
        }

        function constrainAndApply(i) {
            if (!state[i].img) return;
            const slotSize = 200;
            const finalScale = state[i].baseScale * state[i].zoom;
            const currentW = state[i].img.width * finalScale;
            const currentH = state[i].img.height * finalScale;
            const limitX = Math.max(0, (currentW - slotSize) / 2);
            const limitY = Math.max(0, (currentH - slotSize) / 2);
            state[i].x = Math.max(-limitX, Math.min(limitX, state[i].x));
            state[i].y = Math.max(-limitY, Math.min(limitY, state[i].y));
            const imgEl = document.getElementById(`img-${i}`);
            imgEl.style.transform = `translate(-50%, -50%) translate(${state[i].x}px, ${state[i].y}px) scale(${finalScale})`;
        }

        function selectSlot(index) {
            selectedIndex = index;
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            const target = document.querySelector(`.slot[data-index="${index}"]`);
            if(target) target.classList.add('selected');
        }

        fileInput.onchange = (e) => { if (e.target.files[0]) handleFile(e.target.files[0], selectedIndex); };
        
        window.addEventListener('paste', (e) => {
            const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
            if (item) handleFile(item.getAsFile(), selectedIndex);
        });

        function handleFile(file, index) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    state[index].img = img;
                    const imgEl = document.getElementById(`img-${index}`);
                    imgEl.src = e.target.result;
                    state[index].baseScale = 200 / Math.min(img.width, img.height);
                    state[index].x = 0; state[index].y = 0; state[index].zoom = 1;
                    document.querySelector(`.slot[data-index="${index}"]`).classList.add('has-image');
                    document.getElementById(`zoom-${index}`).value = 1;
                    constrainAndApply(index);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function exportCollage(mode) {
            const size = parseInt(document.getElementById('gridInput').value);
            const totalRes = parseInt(document.getElementById('resInput').value);
            const canvas = document.getElementById('exportCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = totalRes; canvas.height = totalRes;
            const slotSize = totalRes / size;
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, totalRes, totalRes);

            for (let i = 0; i < size * size; i++) {
                const s = state[i];
                if (s.img) {
                    const canvasX = (i % size) * slotSize;
                    const canvasY = Math.floor(i / size) * slotSize;
                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(canvasX, canvasY, slotSize, slotSize);
                    ctx.clip();
                    const baseScaleExport = slotSize / Math.min(s.img.width, s.img.height);
                    const drawW = s.img.width * baseScaleExport * s.zoom;
                    const drawH = s.img.height * baseScaleExport * s.zoom;
                    const ratio = slotSize / 200; 
                    const offsetX = (canvasX + slotSize/2) + (s.x * ratio) - (drawW/2);
                    const offsetY = (canvasY + slotSize/2) + (s.y * ratio) - (drawH/2);
                    ctx.drawImage(s.img, offsetX, offsetY, drawW, drawH);
                    ctx.restore();
                }
            }
            if (mode === 'download') {
                const link = document.createElement('a');
                link.download = 'collage.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            } else {
                canvas.toBlob(blob => {
                    navigator.clipboard.write([new ClipboardItem({"image/png": blob})]);
                    const btn = document.getElementById('copyBtn');
                    btn.classList.add('copied');
                    setTimeout(() => btn.classList.remove('copied'), 500);
                });
            }
        }
        updateGrid();
    </script>
</body>
</html>
